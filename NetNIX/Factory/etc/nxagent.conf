# /etc/nxagent.conf — AI agent daemon configuration
# Managed by root. Changes take effect on the next daemon restart.
#
# Lines starting with # are comments. Format: key = value
#
# nxagent runs in the background as a dedicated user and drives an
# interactive shell session by feeding the captured terminal output to a
# KoboldCpp-compatible AI and typing the AI's reply as the next command.
# Operators steer the agent by sending mail to the agent user.

# ?? Identity ?????????????????????????????????????????????????????
# The local user the agent logs in as. The user MUST already exist
# (create with 'useradd <name>') and ideally have its mailbox set up
# (run 'mail --setup' as root after the user is created). The agent
# inherits this user's permissions, so do NOT use root.
agent_username = nxagent

# ?? Pacing ???????????????????????????????????????????????????????
# Seconds to wait between commands. A small delay keeps the AI from
# flooding the shell when it makes mistakes.
command_delay = 5

# Maximum lines of recent shell history to include in each AI prompt.
# Older lines are trimmed. Set this generously - the AI relies on it
# to remember which commands it just ran and which ones failed. The
# history covers ALL turns since the daemon started, not just the
# previous one.
prompt_history_lines = 250

# Maximum seconds to wait for the shell to finish a command and
# re-display its prompt. Long-running commands that exceed this are
# logged and the daemon moves on to the next turn.
prompt_wait_seconds = 60

# Optional turn limit. Set to 0 for unlimited (the default).
max_turns = 0

# ?? Terminal dimensions exposed to the inner shell ???????????????
terminal_width  = 100
terminal_height = 40

# ?? Mail directives ??????????????????????????????????????????????
# When true, every message in the agent's mailbox is deleted after
# being read. When false (default) the agent keeps re-reading them
# every turn until root manually deletes them with 'mail -d'.
consume_mail = false

# ?? System prompt ????????????????????????????????????????????????
# The system prompt prepended to every AI request. There are two
# ways to provide it:
#
#   system_prompt_file  - path to a multi-line VFS file. RECOMMENDED.
#                         Easier to edit and review than a single
#                         giant config line. The factory ships a
#                         ready-to-use prompt at /etc/nxagent.prompt.
#                         Edit that file with 'edit /etc/nxagent.prompt'
#                         to customise the agent's behaviour.
#
#   system_prompt       - single-line override. Used only when no
#                         system_prompt_file is set or the file does
#                         not exist. Leave blank to fall through to
#                         the daemon's compiled-in default.
system_prompt_file = /etc/nxagent.prompt
system_prompt      =

# ?? Kobold endpoint overrides ????????????????????????????????????
# These let root configure the AI endpoint and credentials directly
# from this file, so there is no need to 'su' into the agent user
# to run 'kobold --set' first. Any value left blank/zero falls back
# to the agent user's ~/.config/kobold.conf (or system defaults).
#
# The endpoint is the most common one to set:
# kobold_endpoint   = http://192.168.1.10:5001
kobold_endpoint     =

# Optional API key (some KoboldCpp deployments require one):
# kobold_use_api_key = true
# kobold_api_key     = sk-xxxxxxxxxxxxxxxx
kobold_use_api_key  =
kobold_api_key      =

# Optional generation tuning. Leave blank to use the kobold defaults.
# kobold_max_length is the maximum number of tokens the AI may
# generate per turn (small values keep replies to a single command).
# kobold_temperature controls randomness (0.0 - 2.0).
kobold_max_length   =
kobold_temperature  =

# ?? Logging ??????????????????????????????????????????????????????
# All log streams are enabled by default so operators have full
# visibility into what the agent is doing.
#
# VFS logs (viewable inside NetNIX as root):
#   /var/log/nxagent.log              daemon events (start, stop, errors)
#   /var/log/nxagent/session.log      every prompt sent to the AI and
#                                     every command issued to the shell
#   /var/log/nxagent/shell.log        plain shell transcript (prompts,
#                                     commands, and output interleaved
#                                     just as if a human were typing)
log_events    = true
log_sessions  = true
log_raw_shell = true

# Host logs (real files in logs/ next to the NetNIX executable):
#   logs/nxagent.log                  daemon events
#   logs/nxagent-session.log          full AI prompt / command transcript
#   logs/nxagent-shell.log            plain shell transcript (mirrors
#                                     /var/log/nxagent/shell.log)
host_log_events    = true
host_log_sessions  = true
host_log_raw_shell = true
