# /etc/telnetd.conf — Telnet daemon configuration
# Managed by root. Changes take effect on next daemon restart.
#
# Lines starting with # are comments. Format: key = value

# ?? Network ??????????????????????????????????????????????
# TCP port to listen on (default 2323, ports < 1024 need host root on Linux)
port = 2323

# ?? Terminal ?????????????????????????????????????????????
# Terminal dimensions reported to clients and used by interactive
# commands such as the editor. Most Telnet clients negotiate their
# own size, but these values are used as the server-side defaults.
terminal_width  = 80
terminal_height = 24

# ?? Session limits ???????????????????????????????????????
# Maximum number of concurrent Telnet sessions (0 = unlimited)
max_sessions = 8

# Maximum failed login attempts before the connection is closed
max_login_attempts = 5

# Idle timeout in minutes — sessions with no input are closed
# automatically. 0 = no timeout (sessions stay open forever).
idle_timeout = 30

# ?? Banner ???????????????????????????????????????????????
# Custom login banner displayed when a client connects.
# Set to empty to disable the banner entirely.
login_banner = NetNIX Remote Access

# Message shown after a successful login (before the shell prompt).
# Supports {user} and {session} placeholders.
welcome_message = Welcome {user}! (remote session #{session})

# ?? Logging ??????????????????????????????????????????????
# VFS logging — written to the virtual filesystem, viewable by root.
#   /var/log/telnetd.log           daemon events (start, stop, connections)
#   /var/log/telnetd/<user>.log    per-user session activity
log_events = true
log_sessions = false

# Host logging — written to real files in the logs/ directory next to
# the NetNIX executable. Accessible to the host machine operator.
#   logs/telnetd.log               daemon events (mirrors VFS log)
#   logs/telnetd-<user>.log        per-user session transcripts
host_log_events = false
host_log_sessions = false
