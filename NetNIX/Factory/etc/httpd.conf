# /etc/httpd.conf — HTTP server daemon configuration
# Managed by root. Changes take effect on next daemon restart.
#
# Lines starting with # are comments. Format: key = value

# ?? Network ??????????????????????????????????????????????
# TCP port to listen on (default 8080)
port = 8080

# ?? Content ??????????????????????????????????????????????
# VFS directory to serve as the web root
web_root = /var/www

# Default filename served when a directory is requested
default_page = index.html

# ?? Logging ??????????????????????????????????????????????
# VFS logging — written to the virtual filesystem, viewable by root.
#   /var/log/httpd.log             daemon events and access log
log_events = true

# Host logging — written to real files in the logs/ directory next to
# the NetNIX executable. Accessible to the host machine operator.
#   logs/httpd.log                 daemon events and access log
host_log_events = false
